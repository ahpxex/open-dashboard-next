# Alembic configuration for the fastapi-sqlalchemy-jwt preset.
#
# The database URL is NOT hard-coded here: migrations/env.py reads it from the
# app settings (DATABASE_URL → Postgres, else the SQLite dev file), so `alembic`
# and the app always target the same database. Run the production schema with:
#
#   alembic upgrade head
#
# (The zero-config SQLite dev path still auto-creates tables via init_db(); see
# the README "Migrations" section.)

[alembic]
# Path to migration scripts, relative to this file.
script_location = migrations

# Template used to generate migration file names; %%(rev)s + a slug.
# file_template = %%(rev)s_%%(slug)s

# Use os.pathsep-separated paths; prepend this dir so `app` is importable.
prepend_sys_path = .

# Timezone for migration timestamps (blank = naive/local). Left default.
# timezone =

# sqlalchemy.url is intentionally omitted — env.py supplies it from app settings.

[post_write_hooks]
# No post-write hooks configured.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
